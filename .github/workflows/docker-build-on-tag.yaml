name: Build and Push Release Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  prepare:
    name: Determine image tag
    runs-on: ubuntu-latest
    # Prevent execution on forks
    if: github.repository_owner == 'iExec-Nox'
    outputs:
      image_tag: ${{ steps.determine-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine base tag
        id: determine-tag
        run: |
          # Since this workflow only triggers on tags matching 'v*.*.*' we know we're always dealing with a version tag
          TAG_ON_MAIN=$(git branch -r --contains ${{ github.sha }} 'origin/main')

          if [ -z "$TAG_ON_MAIN" ] ; then
            echo "Error: Tag ${{ github.ref_name }} is not on main branch"
            echo "Tags must be created on main branch to generate X.Y.Z image tags"
            exit 1
          fi

          GITHUB_REF_NAME="${{ github.ref_name }}"
          echo "Processing tag on main branch: ${{ github.ref_name }}"
          echo "image_tag=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_OUTPUT


  build-oci-image:
    name: Build OCI image
    needs: prepare
    uses: iExecBlockchainComputing/github-actions-workflows/.github/workflows/docker-build.yml@docker-build-v3.3.0
    with:
      image-name: docker-regis.iex.ec/nox-handle-gateway
      image-tag: ${{ needs.prepare.outputs.image_tag }}
      dockerfile: Dockerfile
      context: .
      registry: docker-regis.iex.ec
      push: true
      security-scan: true
      security-report: "comment"
      hadolint: true
      platform: linux/amd64
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN_PULL_ONLY }}
      username: ${{ secrets.DOCKERREGIS_USERNAME }}
      password: ${{ secrets.DOCKERREGIS_PASSWORD }}

  build-dockerhub-multiplatform:
    name: Build and push multi-platform image to DockerHub
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx (Docker Build Cloud)
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: ${{ secrets.DOCKER_CLOUD_BUILDER }}

      - name: Compute image tags
        id: tags
        run: |
          DOCKERHUB_ORG=$(echo "${{ secrets.DOCKER_CLOUD_BUILDER }}" | cut -d'/' -f1)
          [ -z "${DOCKERHUB_ORG}" ] && { echo "ERROR: could not extract org from DOCKER_CLOUD_BUILDER"; exit 1; }

          {
            echo "tags<<EOF"
            echo "${DOCKERHUB_ORG}/nox-handle-gateway:${{ needs.prepare.outputs.image_tag }}"
            echo "${DOCKERHUB_ORG}/nox-handle-gateway:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
