name: Build and Push Release Image

on:
  push:
    tags:
      - 'v*.*.*'
  # TEMP: remove before merge — staging dispatch for the new reusable workflow
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to use (test only)'
        default: 'test-reusable-1'
        required: false

jobs:
  prepare:
    name: Determine image tag
    runs-on: ubuntu-latest
    # Prevent execution on forks
    if: github.repository_owner == 'iExec-Nox'
    outputs:
      image_tag: ${{ steps.determine-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine base tag
        id: determine-tag
        env:
          DISPATCH_IMAGE_TAG: ${{ inputs.image_tag }}  # TEMP: remove before merge — staging dispatch input
        run: |
          # TEMP: remove before merge — staging dispatch short-circuit
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${DISPATCH_IMAGE_TAG}" | tee -a $GITHUB_OUTPUT
            exit 0
          fi

          # Since this workflow only triggers on tags matching 'v*.*.*' we know we're always dealing with a version tag
          TAG_ON_MAIN=$(git branch -r --contains ${{ github.sha }} 'origin/main')

          if [ -z "$TAG_ON_MAIN" ] ; then
            echo "Error: Tag ${{ github.ref_name }} is not on main branch"
            echo "Tags must be created on main branch to generate X.Y.Z image tags"
            exit 1
          fi

          GITHUB_REF_NAME="${{ github.ref_name }}"
          echo "Processing tag on main branch: ${{ github.ref_name }}"
          echo "image_tag=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_OUTPUT

  build-oci-image:
    name: Build OCI image
    needs: prepare
    if: github.event_name != 'workflow_dispatch'  # TEMP: remove before merge — skip internal-registry build on staging dispatch
    uses: iExecBlockchainComputing/github-actions-workflows/.github/workflows/docker-build.yml@docker-build-v3.3.0
    with:
      image-name: docker-regis.iex.ec/nox-handle-gateway
      image-tag: ${{ needs.prepare.outputs.image_tag }}
      dockerfile: Dockerfile
      context: .
      registry: docker-regis.iex.ec
      push: true
      security-scan: true
      security-report: "comment"
      hadolint: true
      platform: linux/amd64
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN_PULL_ONLY }}
      username: ${{ secrets.DOCKERREGIS_USERNAME }}
      password: ${{ secrets.DOCKERREGIS_PASSWORD }}

  build-dockerhub-multiplatform:
    name: Build and push multi-platform image to DockerHub
    needs: prepare
    # TEMP: remove before merge — pinned to feat branch for staging; switch to @docker-build-cloud-v0.1.0 once the workflows-repo release-please tag lands (the feat branch will be deleted post-merge there)
    uses: iExecBlockchainComputing/github-actions-workflows/.github/workflows/docker-build-cloud.yml@feat/docker-build-cloud
    with:
      image-name: iexechub/nox-handle-gateway
      image-tag: ${{ needs.prepare.outputs.image_tag }}
      platforms: linux/amd64,linux/arm64
      cloud-builder-endpoint: ${{ vars.DOCKER_CLOUD_BUILDER_LABEL }}
      push-latest: true
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
